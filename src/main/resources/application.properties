spring.application.name=shopping-Car-miguel

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource
spring.datasource.url=jdbc:h2:mem:shoppingcartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# External API
fakestore.api.base-url=https://fakestoreapi.com/products

# Resilience4j — Circuit Breaker (fakestore instance)
resilience4j.circuitbreaker.instances.fakestore.sliding-window-size=10
resilience4j.circuitbreaker.instances.fakestore.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.fakestore.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.fakestore.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.fakestore.register-health-indicator=true

# Resilience4j — Retry (fakestore instance)
resilience4j.retry.instances.fakestore.max-attempts=3
resilience4j.retry.instances.fakestore.wait-duration=500ms
resilience4j.retry.instances.fakestore.retry-exceptions=org.springframework.web.client.ResourceAccessException

# SpringDoc — fix Pageable params in Swagger UI
springdoc.default-flat-param-object=true

# JWT — change secret in production
jwt.secret=c2hvcHBpbmdDYXJ0U2VjcmV0S2V5Rm9yQ3VzY2F0bGFuUHJ1ZWJhVGVjbmljYTIwMjY=
jwt.expiration-ms=86400000

# Actuator — expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
