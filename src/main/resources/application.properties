spring.application.name=shopping-Car-miguel

# Active profile: override with -Dspring.profiles.active=prod for production
spring.profiles.active=dev

# External API (shared across all profiles)
fakestore.api.base-url=https://fakestoreapi.com/products

# Resilience4j — Circuit Breaker (fakestore instance)
resilience4j.circuitbreaker.instances.fakestore.sliding-window-size=10
resilience4j.circuitbreaker.instances.fakestore.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.fakestore.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.fakestore.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.fakestore.register-health-indicator=true

# Resilience4j — Retry (fakestore instance)
resilience4j.retry.instances.fakestore.max-attempts=3
resilience4j.retry.instances.fakestore.wait-duration=500ms
resilience4j.retry.instances.fakestore.retry-exceptions=org.springframework.web.client.ResourceAccessException
